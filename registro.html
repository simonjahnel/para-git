<!DOCTYPE html>

<html>
<head>
    <title>Registro de cuenta</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h1>Crear cuenta</h1>
    <input type="text" placeholder="Nombre"><br><br>
    <input type="text" placeholder="Apellido"><br><br>
    <input type="email" placeholder="Email"><br><br>
    <input type="password" placeholder="Contraseña"><br><br>
    <input type="date"><br><br>
    <label>Teléfono (opcional)</label><br>

    <select id="prefijo">
        <option value="+54">🇦🇷 +54 (Argentina)</option>
        <option value="+1">🇺🇸 +1 (EE.UU.)</option>
        <option value="+34">🇪🇸 +34 (España)</option>
        <option value="+55">🇧🇷 +55 (Brasil)</option>
    </select>

    <input type="tel" placeholder="Número"><br><br>

    <button>Registrarse</button>


</body>


</html>
